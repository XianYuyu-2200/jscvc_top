server {
    listen 80;
    listen [::]:80;
    server_name jscvc.top www.jscvc.top;

    access_log /var/log/nginx/jscvc-top-access.log;
    error_log /var/log/nginx/jscvc-top-error.log;

    location = /wyf {
        return 302 /wyf/;
    }

    location ^~ /wyf/ {
        alias /var/www/jscvc-wyf/;
        index index.html;
        try_files $uri $uri/ /wyf/index.html;
    }

    location = /jjx {
        return 302 https://$host/jjx/;
    }

    location ^~ /jjx/ {
        alias /var/www/jscvc-jjx/;
        index index.html;
        try_files $uri $uri/ /jjx/index.html;
    }

    location = /ljh {
        return 302 https://$host/ljh/;
    }

    location ^~ /ljh/ {
        alias /var/www/jscvc-ljh/;
        index index.html;
        try_files $uri $uri/ /ljh/index.html;
    }

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

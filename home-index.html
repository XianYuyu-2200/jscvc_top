<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JSCVC.TOP | RoboMaster Profiles</title>
  <meta name="description" content="JSCVC.TOP RoboMaster 静态介绍页入口，跳转到 WYF、JJX、LJH。" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #061018;
      --text: #f7fbff;
      --muted: #a8bac8;
      --line: rgba(255, 255, 255, 0.18);
      --panel: rgba(255, 255, 255, 0.075);
      --cyan: #45d8ff;
      --green: #78ff9c;
      --amber: #ffd166;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 16% 16%, rgba(69, 216, 255, 0.22), transparent 28rem),
        radial-gradient(circle at 84% 18%, rgba(255, 209, 102, 0.13), transparent 25rem),
        radial-gradient(circle at 72% 86%, rgba(120, 255, 156, 0.12), transparent 28rem),
        linear-gradient(135deg, #061018 0%, #0b2430 48%, #161a25 100%);
      color: var(--text);
    }

    .shell {
      width: min(1120px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 28px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .mark {
      display: inline-grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      font-weight: 900;
      letter-spacing: 0;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
    }

    main {
      display: grid;
      align-content: center;
      gap: 30px;
      padding: 12px 0 38px;
    }

    .intro {
      max-width: 760px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      color: var(--cyan);
      font-size: 14px;
    }

    .eyebrow::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--cyan);
      box-shadow: 0 0 18px var(--cyan);
    }

    h1 {
      margin: 0;
      font-size: clamp(44px, 8vw, 92px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .lead {
      max-width: 680px;
      margin: 20px 0 0;
      color: var(--muted);
      font-size: clamp(17px, 2vw, 22px);
      line-height: 1.65;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      position: relative;
      overflow: hidden;
      min-height: 310px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: inherit;
      text-decoration: none;
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.24);
      isolation: isolate;
    }

    .card img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.66;
      transform: scale(1.02);
      transition: transform 420ms ease, opacity 420ms ease;
      z-index: -2;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(6, 16, 24, 0.08), rgba(6, 16, 24, 0.72)),
        radial-gradient(circle at 52% 18%, transparent 0 28%, rgba(6, 16, 24, 0.42) 80%);
      z-index: -1;
    }

    .card-content {
      min-height: 310px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 12px;
      padding: 22px;
    }

    .card h2 {
      margin: 0;
      font-size: 34px;
      line-height: 1;
      letter-spacing: 0;
    }

    .card p {
      margin: 0;
      color: #c4d2dc;
      line-height: 1.55;
      font-size: 15px;
    }

    .tag {
      display: inline-flex;
      width: fit-content;
      min-height: 34px;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(6, 16, 24, 0.62);
      color: var(--text);
      font-weight: 800;
      font-size: 13px;
    }

    .card:is(:hover, :focus-visible) {
      border-color: var(--cyan);
      outline: none;
    }

    .card:is(:hover, :focus-visible) img {
      opacity: 0.82;
      transform: scale(1.07);
    }

    footer {
      color: var(--muted);
      font-size: 13px;
      padding-bottom: 10px;
    }

    @media (max-width: 820px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .card,
      .card-content {
        min-height: 230px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="mark">J</div>
      <div class="status">RoboMaster Profiles</div>
    </header>

    <main>
      <section class="intro">
        <div class="eyebrow">JSCVC.TOP</div>
        <h1>RoboMaster<br />成员介绍</h1>
        <p class="lead">选择一个方向进入对应静态介绍页，查看视觉、算法、机械、电控、运营与赛场协作内容。</p>
      </section>

      <nav class="grid" aria-label="成员页面入口">
        <a class="card" href="/wyf/">
          <img src="/wyf/assets/wyf-anime-robot.webp" alt="WYF RoboMaster 机器人 3D 场景" />
          <div class="card-content">
            <span class="tag">/wyf</span>
            <h2>WYF</h2>
            <p>全向轮、云台、射击与整车系统的动态展示入口。</p>
          </div>
        </a>

        <a class="card" href="/jjx/">
          <img src="/jjx/assets/wyf-anime-robot.webp" alt="JJX RoboMaster 机器人 3D 场景" />
          <div class="card-content">
            <span class="tag">/jjx</span>
            <h2>JJX</h2>
            <p>跳跃结构、关节动作与赛场维护流程的介绍入口。</p>
          </div>
        </a>

        <a class="card" href="/ljh/">
          <img src="/ljh/assets/ljh-anime-robot.webp" alt="LJH RoboMaster 哨兵机器人 3D 场景" />
          <div class="card-content">
            <span class="tag">/ljh</span>
            <h2>LJH</h2>
            <p>视觉、算法、运营、机械、电控多方向协同介绍入口。</p>
          </div>
        </a>
      </nav>
    </main>

    <footer>www.jscvc.top</footer>
  </div>
</body>
</html>
